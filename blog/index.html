<p>柯里化概念源自数学和计算机科学的 Lambda 演算，由 Haskell Curry 推广。它的核心思想是通过固定部分参数来简化函数调用。是一种将函数转换为更细粒度函数的过程。具体来说，柯里化将一个接受多个参数的函数转换为一系列接受单一参数的函数。</p>
<p>简单来说就是把接收多参的函数转化成可以逐个调用单个参数并返回接收剩下参数的函数</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover left" data-allow-mismatch data-v-ea20fbef data-v-85ec58f5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-85ec58f5><img src="/simin-xxm/images/闭包.png" alt="JavaScript 闭包" loading="lazy" data-v-85ec58f5></div><div class="blog-post-item-content" data-v-85ec58f5><h3 data-v-85ec58f5><!----><!----><a class="vp-link no-icon link" href="/simin-xxm/article/0895k759/" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript 闭包<!--]--><!----></a></h3><div class="post-meta" data-v-85ec58f5><div class="category-list" data-v-85ec58f5><span class="icon vpi-folder" data-v-85ec58f5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/simin-xxm/blog/categories/?id=fcf748" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-85ec58f5><span class="icon vpi-clock" data-v-85ec58f5></span><span data-v-85ec58f5>2025-01-02</span></div></div><div class="vp-doc excerpt" data-v-85ec58f5>
<p>闭包是指一个函数能够记住其定义时的词法作用域，并能在当前作用域之外调用。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-ea20fbef data-v-85ec58f5><!----><div class="blog-post-item-content" data-v-85ec58f5><h3 data-v-85ec58f5><!----><!----><a class="vp-link no-icon link" href="/simin-xxm/article/8fbcq28x/" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript new 操作符<!--]--><!----></a></h3><div class="post-meta" data-v-85ec58f5><div class="category-list" data-v-85ec58f5><span class="icon vpi-folder" data-v-85ec58f5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/simin-xxm/blog/categories/?id=fcf748" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript<!--]--><!----></a><!----><!--]--><!--]--></div><!----><div class="create-time" data-v-85ec58f5><span class="icon vpi-clock" data-v-85ec58f5></span><span data-v-85ec58f5>2025-01-02</span></div></div><div class="vp-doc excerpt" data-v-85ec58f5><div class="hint-container tip">

<p><code v-pre>new</code> 是 JavaScript 中的一个关键字，用于创建对象的实例。它的主要作用是调用构造函数，并返回一个由构造函数定义的对象实例。<code v-pre>new</code> 是面向对象编程中实现继承和实例化的重要工具。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover left" data-allow-mismatch data-v-ea20fbef data-v-85ec58f5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-85ec58f5><img src="/simin-xxm/images/原型.png" alt="JavaScript 原型" loading="lazy" data-v-85ec58f5></div><div class="blog-post-item-content" data-v-85ec58f5><h3 data-v-85ec58f5><!----><!----><a class="vp-link no-icon link" href="/simin-xxm/article/viqz9tdb/" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript 原型<!--]--><!----></a></h3><div class="post-meta" data-v-85ec58f5><div class="category-list" data-v-85ec58f5><span class="icon vpi-folder" data-v-85ec58f5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/simin-xxm/blog/categories/?id=fcf748" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-85ec58f5><span class="icon vpi-tag" data-v-85ec58f5></span><!--[--><a class="vp-link no-icon link tag vp-tag-u3sp" href="/simin-xxm/blog/tags/?tag=JavaScript" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript<!--]--><!----></a><!--]--></div><div class="create-time" data-v-85ec58f5><span class="icon vpi-clock" data-v-85ec58f5></span><span data-v-85ec58f5>2025-01-02</span></div></div><div class="vp-doc excerpt" data-v-85ec58f5>
<p>在 JavaScript 中，每个对象都有一个内部链接到另一个对象的属性，这个属性被称为 原型（Prototype）。原型是实现继承的基础，允许对象通过原型链访问其他对象的属性和方法。原型链是 JavaScript 对象继承的核心机制。</p>
</div></div></div></template><template><div class="vp-blog-post-item has-cover left" data-allow-mismatch data-v-ea20fbef data-v-85ec58f5><div data-allow-mismatch class="post-cover" style="width:240px;height:180px;" data-v-85ec58f5><img src="/simin-xxm/images/上下文.png" alt="JavaScript 上下文" loading="lazy" data-v-85ec58f5></div><div class="blog-post-item-content" data-v-85ec58f5><h3 data-v-85ec58f5><!----><!----><a class="vp-link no-icon link" href="/simin-xxm/article/ksjbv9cr/" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript 上下文<!--]--><!----></a></h3><div class="post-meta" data-v-85ec58f5><div class="category-list" data-v-85ec58f5><span class="icon vpi-folder" data-v-85ec58f5></span><!--[--><!--[--><a class="vp-link no-icon link" href="/simin-xxm/blog/categories/?id=fcf748" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-85ec58f5><span class="icon vpi-tag" data-v-85ec58f5></span><!--[--><a class="vp-link no-icon link tag vp-tag-u3sp" href="/simin-xxm/blog/tags/?tag=JavaScript" data-v-85ec58f5 data-v-d8719b4a><!--[-->JavaScript<!--]--><!----></a><!--]--></div><div class="create-time" data-v-85ec58f5><span class="icon vpi-clock" data-v-85ec58f5></span><span data-v-85ec58f5>2025-01-02</span></div></div><div class="vp-doc excerpt" data-v-85ec58f5>
<p>在 JavaScript 中，上下文（Context）是指代码在运行时的执行环境，它决定了 <code v-pre>this</code> 的值是什么。上下文是动态的，可以随着函数的调用方式改变。</p>
